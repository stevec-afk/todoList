<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <link rel="shortcut icon" href="#"> <!-- No icon -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700&amp;family=Sacramento&amp;display=swap" rel="stylesheet">
</head>
<body>
    <div id="main-container">
        <div id="sidebar">
            Sidebar
            <button id="new-task">Add Task</button>
        </div>
        <div id="content">
            <div class="task-card">
                <input type="checkbox" class="task-toggle">
                <span class="task-title">Finish Webpack Setup</span>
                <span class="task-date">March 20th</span>
                <button class="expand-btn">⌄</button>
            </div>
            <div class="task-details">
                <p class="task-desc">Move the logic into three files and test the build.</p>
                <div class="task-footer">
                  <span class="task-priority">High</span>
                  <button class="edit-btn">Edit</button>
                  <button class="delete-btn">Delete</button>
                </div>
              </div>
        </div>
</body>
</html>
