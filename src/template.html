<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <link rel="shortcut icon" href="#"> <!-- No icon -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700&amp;family=Sacramento&amp;display=swap" rel="stylesheet">
</head>
<body>
    <div id="main-container">
        <aside id="sidebar">
            <div id="title"> 
                ToDo List
            </div>
            <div id="sidebar-main">
                <button id="new-task">Add Task</button>
                <div class="sidebar-container"> 
                    <button id="all-tasks">All Tasks</button>
                    <button id="no-due-date">No Due Date</button>
                    <button id="due-today">Today</button>
                    <button id="due-tomorrow">Tomorrow</button>
                    <button id="due-month">This month</button>
                </div>
                </br>
                <h3>Categories</h1>
                <div class="sidebar-container" id="categories">
                </div>
            </div>
            <div id="side-footer">
                <button id="reset">⚠️Reset all data⚠️</button>
                <span> Steve C | source </span>
            </div>
        </aside>
        <div id="header">
            Current view
        </div>
        <main id="content">
            <div class="task-card">
                <input type="checkbox" class="task-toggle">
                <span class="task-title">Finish Webpack Setup</span>
                <span class="task-date">March 20th</span>
                <button class="details-btn">...</button>
            </div>
        </main>
        <dialog id="add-modal">
            <button command="close" commandfor="add-modal" class="close-btn">X</button>
            <form method="dialog" id="add-form">
                <h3>Add new task</h3>
                <div class="form-group">
                    <label for="add-title">Title*</label>
                    <input type="text" id="add-title" name="title" maxlength="80" required />
                </div>
                <div class="form-group">
                    <label for="add-desc">Description</label>
                    <input type="text" id ="add-desc" name="description" maxlength="140" />
                </div>
                <div class="form-group">
                    <label for="add-cat">Category</label>
                    <input type="text" id="add-cat" name="category" />
                </div>
                <div class="form-group">
                    <label for="add-date">Due date</label>
                    <input type="date" id="add-date" name="duedate" />
                </div>
                <div class="form-group">
                    <label for="add-prio">Priority*</label>
                    <select type="text" id="add-prio" name="priority" required>
                        <option value="" disabled selected>Select Priority</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <button type="submit">Add Task</button>
            </form>
        </dialog>
        <dialog id="edit-modal">
            <button command="close" commandfor="edit-modal" class="close-btn">X</button>
            <form method="dialog" id="edit-form">
                <h3>Edit task</h3>
                <div class="form-group">
                    <label for="edit-title">Title*</label>
                    <input type="text" id="edit-title" name="title" maxlength="80" required />
                </div>
                <div class="form-group">
                    <label for="edit-desc">Description</label>
                    <input type="text" id ="edit-desc" name="description" maxlength="140" />
                </div>
                <div class="form-group">
                    <label for="edit-cat">Category</label>
                    <input type="text" id="edit-cat" name="category" />
                </div>
                <div class="form-group">
                    <label for="edit-date">Due date</label>
                    <input type="date" id="edit-date" name="duedate" />
                </div>
                <div class="form-group">
                    <label for="edit-prio">Priority*</label>
                    <select type="text" id="edit-prio" name="priority" required>
                        <option value="" disabled selected>Select Priority</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" id="edit-modal-delete" class="danger">Delete</button>
                    <button type="submit">Save Changes</button>
                </div>
            </form>
        </dialog>
    </div>
</body>
</html>
