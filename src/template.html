<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <link rel="shortcut icon" href="#"> <!-- No icon -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700&amp;family=Sacramento&amp;display=swap" rel="stylesheet">
</head>
<body class="preload">
    <div id="main-container">
        <aside id="sidebar">
            <button id="close-sidebar" class="material-icons">close</button>
            <div id="sidebar-main">
                <div class="sidebar-container"> 
                    <h3>Filters</h3>
                    <button id="all-tasks" data-category="all-tasks">
                        <span class="material-icons">inventory_2</span>
                        <span>All Tasks</span>
                    </button>
                    <button id="no-due-date">
                        <span class="material-icons">upcoming</span>
                        <span>No Due Date</span>
                    </button>
                    <button id="due-today">
                        <span class="material-icons">today</span>
                        <span>Today</span>
                    </button>
                    <button id="due-tomorrow">
                        <span class="material-icons">event_repeat</span>
                        <span>Tomorrow</span>
                    </button>
                    <button id="due-month">
                        <span class="material-icons">calendar_month</span>
                        <span>This month</span>
                    </button>
                </div>
                <h3>Categories</h3>
                <div class="sidebar-container" id="categories">
                </div>
            </div>
            <div class="sidebar-options">
                <label class="toggle-container">
                    <span class="label-text">Show completed</span>
                    <div class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </div>
                </label>
                <label class="toggle-container">
                    <span class="label-text">Dark mode</span>
                    <div class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </div>
                </label>
            </div>
            <div id="side-footer">
                <button id="reset">⚠️ Reset the app ⚠️</button>
                <div class="footer-links">
                    <a href="https://github.com/stevec-afk" target="_blank">Steve C</a>
                    <span class="separator">|</span>
                    <a href="https://github.com/stevec-afk/todoList" target="_blank">Source</a>
                </div>
            </div>
        </aside>
        <div id="header">
            <div class="header-left">
                <button id="menu-toggle" class="material-icons">menu</button>
                <div id="title"> 
                    <span class='material-icons'>checklist</span>
                    <span>ToDo List</span>
                </div>
            </div>
            <div class="header-right">
                <button id="toggle-completed" class="material-icons" title="Toggle Completed">visibility</button>
                <button id="theme-toggle" class="material-icons" title="Toggle Dark Mode">dark_mode</button>
            </div>
        </div>
        <main id="content">
        </main>
        <dialog id="add-modal">
            <button command="close" commandfor="add-modal" class="close-btn">X</button>
            <form method="dialog" id="add-form">
                <h3>Add new task</h3>
                <div class="form-group">
                    <label for="add-title">Title*</label>
                    <input type="text" id="add-title" name="title" maxlength="80" required />
                </div>
                <div class="form-group">
                    <label for="add-desc">Description</label>
                    <input type="text" id ="add-desc" name="description" maxlength="140" />
                </div>
                <div class="form-group">
                    <label for="add-cat">Category</label>
                    <input type="text" id="add-cat" name="category" />
                </div>
                <div class="form-group">
                    <label for="add-date">Due date</label>
                    <input type="date" id="add-date" name="duedate" />
                </div>
                <div class="form-group">
                    <label for="add-prio">Priority*</label>
                    <select type="text" id="add-prio" name="priority" required>
                        <option value="" disabled selected>Select Priority</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <button type="submit">Add Task</button>
            </form>
        </dialog>
        <dialog id="edit-modal">
            <button command="close" commandfor="edit-modal" class="close-btn">X</button>
            <form method="dialog" id="edit-form">
                <h3>Edit task</h3>
                <div class="form-group">
                    <label for="edit-title">Title*</label>
                    <input type="text" id="edit-title" name="title" maxlength="80" required />
                </div>
                <div class="form-group">
                    <label for="edit-desc">Description</label>
                    <input type="text" id ="edit-desc" name="description" maxlength="140" />
                </div>
                <div class="form-group">
                    <label for="edit-cat">Category</label>
                    <input type="text" id="edit-cat" name="category" />
                </div>
                <div class="form-group">
                    <label for="edit-date">Due date</label>
                    <input type="date" id="edit-date" name="duedate" />
                </div>
                <div class="form-group">
                    <label for="edit-prio">Priority*</label>
                    <select type="text" id="edit-prio" name="priority" required>
                        <option value="" disabled selected>Select Priority</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <button type="submit">Save Changes</button>
            </form>
        </dialog>
    </div>
</body>
</html>
