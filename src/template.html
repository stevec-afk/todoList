<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <link rel="shortcut icon" href="#"> <!-- No icon -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700&amp;family=Sacramento&amp;display=swap" rel="stylesheet">
</head>
<body>
    <div id="main-container">
        <div id="title"> 
            ToDo List
        </div>
        <div id="sidebar">
            <button id="new-task">Add Task</button>
            <div class="sidebar-container"> 
                <button id="all-tasks">All Tasks</button>
                <button id="no-due-date">No Due Date</button>
                <button id="due-today">Today</button>
                <button id="due-tomorrow">Tomorrow</button>
                <button id="due-month">This month</button>
            </div>
            </br>
            <div class="sidebar-container">
                Categories
                <button id="">Work</button>
                <button id="">School</button>
                <button id="">Personal</button>
                <button id="">Long-term</button>
            </div>
        </div>
        <div id="side-footer">
            <button id="reset">⚠️Reset all data⚠️</button>
            <span> Steve C | source </span>
        </div>
        <div id="header">
            Current view
        </div>
        <div id="content">
            <div class="task-card">
                <input type="checkbox" class="task-toggle">
                <span class="task-title">Finish Webpack Setup</span>
                <span class="task-date">March 20th</span>
                <button class="details-btn">...</button>
            </div>
        </div>
</body>
</html>
