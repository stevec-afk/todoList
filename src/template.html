<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <link rel="shortcut icon" href="#"> <!-- No icon -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700&amp;family=Sacramento&amp;display=swap" rel="stylesheet">
</head>
<body>
    <div id="main-container">
        <aside id="sidebar">
            <div id="title"> 
                ToDo List
            </div>
            <div id="sidebar-main">
                <button id="new-task">Add Task</button>
                <div class="sidebar-container"> 
                    <button id="all-tasks">All Tasks</button>
                    <button id="no-due-date">No Due Date</button>
                    <button id="due-today">Today</button>
                    <button id="due-tomorrow">Tomorrow</button>
                    <button id="due-month">This month</button>
                </div>
                </br>
                <div class="sidebar-container" id="categories">
                </div>
            </div>
            <div id="side-footer">
                <button id="reset">⚠️Reset all data⚠️</button>
                <span> Steve C | source </span>
            </div>
        </aside>
        <div id="header">
            Current view
        </div>
        <main id="content">
            <div class="task-card">
                <input type="checkbox" class="task-toggle">
                <span class="task-title">Finish Webpack Setup</span>
                <span class="task-date">March 20th</span>
                <button class="details-btn">...</button>
            </div>
        </main>
        <dialog id="new-todo-modal">
            <form method="dialog" id="form">
                <button type="submit" class="close-btn" formmethod="dialog" formnovalidate>&times</button>
                <h3>Add new todo</h3>

                <div class="form-group">
                    <label for="todo-title">Title</label>
                    <input type="text" id="todo-title" name="title" maxlength="80" required />
                </div>

                <div class="form-group">
                    <label for="todo-desc">Description</label>
                    <input type="text" id ="todo-desc" name="description" maxlength="140" />
                </div>

                <div class="form-group">
                    <label for="todo-cat">Category</label>
                    <input type="text" id="todo-cat" name="category" />
                </div>

                <div class="form-group">
                    <label for="todo-date">Due date</label>
                    <input type="date" id="todo-date" name="duedate" />
                </div>

                <div class="form-group">
                    <label for="todo-prio">Priority</label>
                    <select type="text" id="todo-prio" name="priority" required>
                        <option value="" disabled selected>Select Priority</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="close-btn" formmethod="dialog" formnovalidate>Cancel</button>
                    <button type="submit">Submit</button>
                </div>
            </form>
        </dialog>
        <dialog id="details-modal">
            <h2 id="details-title"></h2>
            <p id="details-description"></p>
            <p id="details-date"></p>
            <p id="details-priority"></p>
            
            <div class="modal-actions">
                <button id="delete-task-btn" class="danger">Delete Task</button>
                <button id="close-details">Close</button>
            </div>
        </dialog>
        
    </div>
</body>
</html>
